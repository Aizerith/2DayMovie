spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/2daymovie_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

app:
  cors:
    allowed-origin: http://localhost:4200
  frontend:
    base-url: http://localhost:4200
  storage:
    endpoint: http://localhost:9000
    public-endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: 2daymovie-videos
    public-url-base:
    presigned-expiry-minutes: 15
    max-file-size-bytes: 26843545600
