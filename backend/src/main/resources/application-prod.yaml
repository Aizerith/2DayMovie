spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}
  frontend:
    base-url: ${FRONTEND_BASE_URL}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://minio:9000}
    public-endpoint: ${STORAGE_PUBLIC_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:2daymovie-videos}
    public-url-base: ${STORAGE_PUBLIC_URL_BASE:}
    presigned-expiry-minutes: ${STORAGE_PRESIGNED_EXPIRY_MINUTES:15}
    max-file-size-bytes: ${STORAGE_MAX_FILE_SIZE_BYTES:5368709120}
