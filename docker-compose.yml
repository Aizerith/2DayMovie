services:
  postgres:
    image: postgres:16
    container_name: 2daymovie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: 2daymovie_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d 2daymovie_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    container_name: 2daymovie-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: https://2daymovie.laurent-chen.fr
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    container_name: 2daymovie-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/2daymovie_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CORS_ALLOWED_ORIGIN: https://2daymovie.laurent-chen.fr
      FRONTEND_BASE_URL: https://2daymovie.laurent-chen.fr
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_URL_BASE: https://2daymovie.laurent-chen.fr/minio
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: 2daymovie-videos
      STORAGE_PRESIGNED_EXPIRY_MINUTES: 15
      STORAGE_MAX_FILE_SIZE_BYTES: 5368709120

  frontend:
    build:
      context: ./frontend
    container_name: 2daymovie-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:9020:80"

volumes:
  postgres_data:
  minio_data:
