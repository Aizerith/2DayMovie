<VirtualHost *:80>
    ServerName 2daymovie.laurent-chen.fr

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName 2daymovie.laurent-chen.fr

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/2daymovie.laurent-chen.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/2daymovie.laurent-chen.fr/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 3600
    LimitRequestBody 0

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass /ws ws://127.0.0.1:9020/ws retry=0 timeout=3600
    ProxyPassReverse /ws ws://127.0.0.1:9020/ws

    ProxyPass / http://127.0.0.1:9020/ retry=0 timeout=3600
    ProxyPassReverse / http://127.0.0.1:9020/

    ErrorLog ${APACHE_LOG_DIR}/2daymovie-error.log
    CustomLog ${APACHE_LOG_DIR}/2daymovie-access.log combined
</VirtualHost>
</IfModule>
