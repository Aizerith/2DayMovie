@if (open()) {
  <dialog class="modal modal-open">
    <div class="modal-box">
      <h3 class="text-lg font-bold">{{ title() }}</h3>
      <p class="py-4 text-base-content/70">{{ message() }}</p>
      <div class="modal-action">
        <button class="btn btn-ghost" type="button" (click)="cancelled.emit()">{{ resolvedCancelLabel() }}</button>
        <button
          class="btn"
          [class.btn-error]="tone() === 'error'"
          [class.btn-warning]="tone() === 'warning'"
          [class.btn-primary]="tone() === 'primary'"
          type="button"
          (click)="confirmed.emit()"
        >
          {{ resolvedConfirmLabel() }}
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop">
      <button type="button" (click)="cancelled.emit()">{{ 'common.close' | transloco }}</button>
    </form>
  </dialog>
}
