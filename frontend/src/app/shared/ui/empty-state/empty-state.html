<div class="card border border-dashed border-base-300 bg-base-100/70 shadow-sm">
  <div class="card-body items-start text-left">
    <div class="badge badge-outline">{{ 'common.emptyState' | transloco }}</div>
    <h3 class="text-2xl font-bold">{{ title() }}</h3>
    <p class="max-w-xl text-base-content/70">{{ description() }}</p>

    @if (actionLabel()) {
      <a [routerLink]="actionLink()" class="btn btn-primary">{{ actionLabel() }}</a>
    }
  </div>
</div>
