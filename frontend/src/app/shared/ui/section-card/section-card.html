<section class="card bg-base-100 shadow-xl">
  <div class="card-body gap-5 p-6 sm:p-7">
    <div class="space-y-1.5">
      <h2 class="card-title">{{ title() }}</h2>
      @if (subtitle()) {
        <p class="text-sm leading-6 text-base-content/70">{{ subtitle() }}</p>
      }
    </div>

    <div class="flex flex-col gap-4" [class.flex-wrap]="actions()" [class.md:flex-row]="actions()" [class.md:items-center]="actions()">
      <ng-content />
    </div>
  </div>
</section>
