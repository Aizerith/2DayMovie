<div [attr.data-theme]="theme()" class="min-h-screen bg-base-200 text-base-content">
  <div class="navbar border-b border-white/10 bg-base-200/80 px-4 backdrop-blur">
    <div class="mx-auto flex w-full max-w-6xl items-center justify-between">
      <a routerLink="/" class="btn btn-ghost px-2 text-lg font-black tracking-tight">2DayMovie</a>

      <div class="flex items-center gap-2">
        <button class="btn btn-ghost btn-sm" type="button" (click)="toggleTheme()">
          Theme
        </button>
      </div>
    </div>
  </div>

  <main class="min-h-[calc(100vh-4rem)]">
    <router-outlet />
  </main>
</div>
