<section class="hero min-h-full px-4 py-8 sm:py-12">
  <div class="hero-content w-full max-w-6xl items-stretch flex-col gap-10 lg:flex-row-reverse lg:items-start">
    <app-page-intro
      class="w-full"
      [badge]="'verifyEmail.badge' | transloco"
      badgeClass="badge badge-success badge-outline"
      [title]="'verifyEmail.title' | transloco"
      [description]="'verifyEmail.description' | transloco"
      [compact]="true"
    >
      <div class="space-y-6">
        <app-section-card [title]="'verifyEmail.helpTitle' | transloco" [subtitle]="'verifyEmail.helpSubtitle' | transloco">
          <p class="text-sm text-base-content/70">{{ 'verifyEmail.helpBody' | transloco }}</p>
        </app-section-card>
        <div class="pt-1">
          <a routerLink="/login" class="btn btn-ghost min-h-11 justify-start px-0">{{ 'verifyEmail.backLogin' | transloco }}</a>
        </div>
      </div>
    </app-page-intro>

    <div class="card w-full max-w-xl rounded-[2rem] border border-base-300/35 bg-base-100 shadow-2xl">
      <div class="card-body space-y-6 p-6 sm:p-8">
        @if (loading()) {
          <app-notice-banner tone="info" [message]="'verifyEmail.loading' | transloco" />
        }

        @if (success()) {
          <app-notice-banner tone="success" [message]="'verifyEmail.success' | transloco" />
        }

        @if (errorMessage()) {
          <app-notice-banner tone="error" [message]="errorMessage()" />
          <a routerLink="/resend-verification" class="btn btn-outline min-h-12 w-full sm:w-auto">{{ 'verifyEmail.resendAction' | transloco }}</a>
        }
      </div>
    </div>
  </div>
</section>
