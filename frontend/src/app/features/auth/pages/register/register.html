<section class="hero min-h-full px-4 py-8 sm:py-12">
  <div class="hero-content w-full max-w-6xl items-stretch flex-col gap-10 lg:flex-row-reverse lg:items-start">
    <app-page-intro
      class="w-full"
      [badge]="'register.badge' | transloco"
      badgeClass="badge badge-primary badge-outline"
      [title]="'register.title' | transloco"
      [description]="'register.description' | transloco"
      [compact]="true"
    >
      <div class="space-y-6">
        <app-section-card [title]="'register.helpTitle' | transloco" [subtitle]="'register.helpSubtitle' | transloco">
          <p class="text-sm text-base-content/70">{{ 'register.helpBody' | transloco }}</p>
        </app-section-card>
        <div class="pt-1">
          <a routerLink="/login" class="btn btn-ghost min-h-11 justify-start px-0">{{ 'register.backLogin' | transloco }}</a>
        </div>
      </div>
    </app-page-intro>

    <div class="card w-full max-w-xl rounded-[2rem] border border-base-300/35 bg-base-100 shadow-2xl">
      <div class="card-body gap-8 p-6 sm:p-8">
        <form class="space-y-7" [formGroup]="form" (ngSubmit)="submit()">
          <div class="flex flex-wrap items-center gap-2 text-xs font-medium uppercase tracking-[0.18em] text-base-content/45">
            <span class="badge badge-ghost badge-sm">Compte public</span>
            <span class="badge badge-ghost badge-sm">Email vérifié</span>
          </div>

          <app-form-field [label]="'common.email' | transloco" [required]="true" [error]="fieldError('email')" [hint]="'register.emailHint' | transloco">
            <input class="input input-bordered input-lg h-14 w-full rounded-2xl bg-base-100/80 px-4 shadow-inner shadow-base-300/15 transition focus:outline-none focus:ring-2 focus:ring-primary/20"
                   data-testid="register-email" type="email" formControlName="email" placeholder="utilisateur@demo.dev" autocomplete="email">
          </app-form-field>

          <app-form-field [label]="'users.fields.firstName' | transloco" [required]="true" [error]="fieldError('firstName')">
            <input class="input input-bordered input-lg h-14 w-full rounded-2xl bg-base-100/80 px-4 shadow-inner shadow-base-300/15 transition focus:outline-none focus:ring-2 focus:ring-primary/20"
                   data-testid="register-first-name" type="text" formControlName="firstName" placeholder="Jane" autocomplete="given-name">
          </app-form-field>

          <app-form-field [label]="'users.fields.lastName' | transloco" [required]="true" [error]="fieldError('lastName')">
            <input class="input input-bordered input-lg h-14 w-full rounded-2xl bg-base-100/80 px-4 shadow-inner shadow-base-300/15 transition focus:outline-none focus:ring-2 focus:ring-primary/20"
                   data-testid="register-last-name" type="text" formControlName="lastName" placeholder="Doe" autocomplete="family-name">
          </app-form-field>

          <app-form-field [label]="'common.password' | transloco" [required]="true" [error]="fieldError('password')" [hint]="'register.passwordHint' | transloco">
            <input class="input input-bordered input-lg h-14 w-full rounded-2xl bg-base-100/80 px-4 shadow-inner shadow-base-300/15 transition focus:outline-none focus:ring-2 focus:ring-primary/20"
                   data-testid="register-password" type="password" formControlName="password" placeholder="Secret123!" autocomplete="new-password">
          </app-form-field>

          <app-form-field [label]="'register.confirmPassword' | transloco" [required]="true" [error]="fieldError('confirmPassword')">
            <input class="input input-bordered input-lg h-14 w-full rounded-2xl bg-base-100/80 px-4 shadow-inner shadow-base-300/15 transition focus:outline-none focus:ring-2 focus:ring-primary/20"
                   data-testid="register-confirm-password" type="password" formControlName="confirmPassword" placeholder="Secret123!" autocomplete="new-password">
          </app-form-field>

          <app-form-actions
            [submitLabel]="'register.submit' | transloco"
            [submitting]="submitting()"
            submitTestId="register-submit"
            (cancelled)="resetForm()"
          />
        </form>
      </div>
    </div>
  </div>
</section>
